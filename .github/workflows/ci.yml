name: CI
run-name: CI for commit ${{ github.sha }} by @${{ github.actor }}

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

env:
  BETTER_AUTH_SECRET: my-betterauth-secret
  POSTGRES_USER: testuser
  POSTGRES_PASSWORD: testpassword
  POSTGRES_DB: testdb
  DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
  DIRECT_URL: postgresql://testuser:testpassword@localhost:5432/testdb

jobs:
  ci:
    name: Lint, Prettier, and Test Case Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Generate prisma client
        run: npx prisma generate

      - name: Run migration
        run: npx prisma migrate deploy

      - name: Run lint
        run: npm run lint

      - name: Run prettier
        run: npm run format:check

      - name: Run seeding script
        run: npm run prisma:seed

      - name: Run tests
        run: npm test

      - name: Run build check
        run: npm run build
